<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@600;700&display=swap" rel="stylesheet">
    <title>🐙Кракен VPN Глубин | {{ username }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root[data-theme="dark"] {
            --bg-body: #0b0d14;
            --bg-card: #161a26;
            --bg-item: #1c2230;
            --text-main: #ffffff;
            --text-dim: #717686;
            --accent: #4d77ff;
            --border: rgba(255, 255, 255, 0.05);
        }

        :root[data-theme="light"] {
            --bg-body: #f4f7fa;
            --bg-card: #ffffff;
            --bg-item: #f8f9fc;
            --text-main: #1a1c23;
            --text-dim: #676d7c;
            --accent: #3b5bdb;
            --border: rgba(0, 0, 0, 0.05);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            margin: 0; padding: 20px;
        }

        .container { max-width: 480px; margin: 0 auto; }

        /* Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px;
        }
        .theme-btn {
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-main); padding: 10px; border-radius: 10px; cursor: pointer;
        }

        /* User Grid (Инфо панель) */
        .user-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px;
        }
        .user-card.profile {
            grid-column: span 2; display: flex; align-items: center; gap: 15px; padding: 15px;
        }
        .stat-card, .user-card {
            background: var(--bg-card); border-radius: 16px; padding: 16px;
            border: 1px solid var(--border);
        }
        .stat-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }

        /* Avatar */
        .avatar-wrapper {
            width: 60px; height: 60px; border-radius: 16px;
            background: var(--accent); display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .avatar { width: 100%; height: 100%; object-fit: cover; }

        /* Buttons */
        .btn-main {
            background: var(--accent); color: white; display: block; text-align: center;
            padding: 16px; border-radius: 12px; text-decoration: none; font-weight: 600;
            margin-bottom: 12px;
        }
        .btn-secondary {
            background: var(--bg-item); color: var(--text-main); border: none;
            width: 100%; padding: 14px; border-radius: 12px; cursor: pointer;
        }

        /* OS List */
        .os-item { background: var(--bg-item); border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
        .os-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .os-content { display: none; padding: 0 15px 15px; }
        .os-item.open .os-content { display: block; }
        .os-item.open .arrow { transform: rotate(180deg); }
    </style>

</head>
<body>

<div class="container">
    <header class="header">
        <div class="logo">🐙 CRACKEN VPN</div>
        <button id="theme-toggle" class="theme-btn">
            <i class="fas fa-moon"></i>
        </button>
    </header>

    <section class="user-grid">
        <div class="user-card profile">
            <div class="avatar-wrapper">
                <img src="https://github.com/quisanatic/CrackenVPNSub/blob/main/cracken.png?raw=true" alt="Kraken" class="avatar">
            </div>
            <div class="profile-info">
                <h3>{{ user.username }}</h3>
                <p>@{{ user.username }}</p>
            </div>
        </div>
        
        <div class="stat-card">
            <span class="stat-label">Состояние</span>
            <strong class="status-active">На плаву</strong>
        </div>
        <div class="stat-card">
            <span class="stat-label">Поглощено</span>
            <strong>{{ user.used_traffic | bytesformat }} / {{ user.data_limit | bytesformat }}</strong>
        </div>
        <div class="stat-card">
            <span class="stat-label">Срок владения</span>
            <strong>{{ user.expire | datetime }}</strong>
        </div>
    </section>

    <main class="action-box">
        <h2 class="section-title">1. Призовите Happ</h2>
        <div class="os-list">
            <div class="os-item" onclick="this.classList.toggle('open')">
                <div class="os-header">
                    <span><i class="fab fa-windows"></i> Windows</span>
                    <i class="fas fa-chevron-down arrow"></i>
                </div>
                <div class="os-content">
                    <a href="#" class="btn-primary">Скачать Happ</a>
                </div>
            </div>
            </div>

        <h2 class="section-title">2. Установите связь</h2>
        <div class="buttons-group">
            <a href="happ://add/{{ user.subscription_url }}" class="btn-main">📥 ВЦЕПИТЬСЯ В Happ</a>
            <button class="btn-secondary" onclick="copyLink('{{ user.subscription_url }}', this)">Копировать руну</button>
        </div>
    </main>
</div>

<script>
    // Логика переключения темы
    const toggleBtn = document.getElementById('theme-toggle');
    const html = document.documentElement;

    toggleBtn.addEventListener('click', () => {
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        toggleBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    });

    async function copyLink(link, button) {
        await navigator.clipboard.writeText(link);
        const originalText = button.textContent;
        button.textContent = "Скопировано!";
        setTimeout(() => { button.textContent = originalText; }, 1500);
    }
</script>

</body>
</html>
