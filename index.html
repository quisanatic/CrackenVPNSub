<style>
  /* Обновленные переменные для свечения */
  :root[data-theme="dark"] {
    --bg-body: #0b0d14;
    --bg-card: #161a26;
    --bg-item: #1c2230;
    --text-main: #ffffff;
    --text-dim: #717686;
    --accent: #4d77ff;
    --border: rgba(255, 255, 255, 0.05);
    --pg-bg: #1c2230;
    --pg-fill: #4d77ff;
    --particle-color: rgba(255, 255, 255, 0.15);
    --pulse-color: rgba(77, 119, 255, 0.8); /* Цвет импульса */
  }

  :root[data-theme="light"] {
    --bg-body: #f4f7fa;
    --bg-card: #ffffff;
    --bg-item: #f8f9fc;
    --text-main: #1a1c23;
    --text-dim: #676d7c;
    --accent: #3b5bdb;
    --border: rgba(0, 0, 0, 0.05);
    --pg-bg: #e1e7f0;
    --pg-fill: #4d77ff;
    --particle-color: rgba(59, 91, 219, 0.2);
    --pulse-color: rgba(59, 91, 219, 0.6);
  }

  #particle-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
  }
</style>

<script>
  const canvas = document.getElementById("particle-canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particlesArray = [];
  let pulsesArray = [];

  function getVar(name) {
    return getComputedStyle(document.documentElement)
      .getPropertyValue(name)
      .trim();
  }

  class Particle {
    constructor(x, y, dx, dy, size) {
      this.x = x;
      this.y = y;
      this.dx = dx;
      this.dy = dy;
      this.size = size;
    }

    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = getVar("--particle-color");
      ctx.fill();
    }

    update() {
      if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
      if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
      this.x += this.dx;
      this.y += this.dy;
      this.draw();
    }
  }

  class Pulse {
    constructor(startPart, endPart) {
      this.start = startPart;
      this.end = endPart;
      this.progress = 0;
      this.speed = 0.005 + Math.random() * 0.01; // Скорость импульса
    }

    draw() {
      const x = this.start.x + (this.end.x - this.start.x) * this.progress;
      const y = this.start.y + (this.end.y - this.start.y) * this.progress;

      ctx.beginPath();
      ctx.arc(x, y, 1.5, 0, Math.PI * 2);
      ctx.shadowBlur = 10;
      ctx.shadowColor = getVar("--accent");
      ctx.fillStyle = getVar("--pulse-color");
      ctx.fill();
      ctx.shadowBlur = 0; // Сброс тени для оптимизации
    }

    update() {
      this.progress += this.speed;
      if (this.progress <= 1) {
        this.draw();
        return true;
      }
      return false;
    }
  }

  function init() {
    particlesArray = [];
    pulsesArray = [];
    // Делаем частиц МЕНЬШЕ (например, всего 40-50 на экран)
    const numberOfParticles = 45;

    for (let i = 0; i < numberOfParticles; i++) {
      let size = Math.random() * 2 + 1;
      // Генерируем частицы ближе к центру (где основной контент)
      let x = Math.random() * (canvas.width * 0.6) + canvas.width * 0.2;
      let y = Math.random() * canvas.height;
      let dx = Math.random() * 0.4 - 0.2;
      let dy = Math.random() * 0.4 - 0.2;
      particlesArray.push(new Particle(x, y, dx, dy, size));
    }
  }

  function animate() {
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Рисуем связи
    for (let a = 0; a < particlesArray.length; a++) {
      for (let b = a + 1; b < particlesArray.length; b++) {
        let distance =
          (particlesArray[a].x - particlesArray[b].x) ** 2 +
          (particlesArray[a].y - particlesArray[b].y) ** 2;

        // Среднее расстояние для связей
        if (distance < (canvas.width / 5) * (canvas.height / 5)) {
          ctx.strokeStyle = getVar("--particle-color");
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
          ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
          ctx.stroke();

          // Шанс появления нового импульса («нейрона»)
          if (Math.random() > 0.997 && pulsesArray.length < 20) {
            pulsesArray.push(new Pulse(particlesArray[a], particlesArray[b]));
          }
        }
      }
      particlesArray[a].update();
    }

    // Обновляем импульсы
    pulsesArray = pulsesArray.filter((pulse) => pulse.update());
  }

  window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    init();
  });

  init();
  animate();
</script>
